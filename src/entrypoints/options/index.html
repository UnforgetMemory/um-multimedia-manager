<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMM 管理面板</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body { background: transparent !important; }
    html { background-color: hsl(0 0% 100%); color-scheme: light; }
    html.dark { background-color: hsl(240 6% 10%); color-scheme: dark; }
    :root { --page-margin: 20px; --section-gap: 24px; --card-padding: 16px; }
    @media (prefers-color-scheme: dark) {
      html:not(.dark) { color-scheme: dark; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
