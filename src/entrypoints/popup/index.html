<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMManager</title>
  <style>
    html, body { margin: 0; padding: 0; width: 480px; height: 480px; overflow-y: auto; }
    :root {
      --popup-max-width: 560px;
      --page-margin: 20px;
      --section-gap: 24px;
      --card-padding: 16px;
    }
  </style>
  <script>
    // Apply theme BEFORE Vue mounts to prevent light→dark flash
    // 1. Check system preference immediately (sync)
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
    // 2. Read stored setting and override (async but fast)
    try {
      chrome.storage.local.get(['settings'], function(result) {
        var appearance = (result && result.settings && result.settings.appearance) || 'auto';
        if (appearance === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (appearance === 'light') {
          document.documentElement.classList.remove('dark');
        }
        // 'auto' case already handled by matchMedia above
      });
    } catch(e) {}
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
