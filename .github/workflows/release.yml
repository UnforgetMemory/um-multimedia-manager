name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Chrome
        run: npx wxt build -b chrome
      - name: Fix paths (Chrome only)
        run: node scripts/fix-paths.js
      - name: Zip Chrome
        run: |
          cd dist
          zip -r ../umm-${{ steps.version.outputs.VERSION }}-chrome.zip chrome-mv3/

      - name: Build Firefox
        run: npx wxt build -b firefox
      - name: Zip Firefox
        run: |
          cd dist
          zip -r ../umm-${{ steps.version.outputs.VERSION }}-firefox.zip firefox-mv2/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            umm-*-chrome.zip
            umm-*-firefox.zip
