<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMM - 多媒体管理器</title>
  
  <!-- 防止 Flash of Wrong Theme -->
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('umm-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('theme-dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (theme === 'light') {
          document.documentElement.classList.add('theme-light');
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.classList.add(`theme-${systemTheme}`);
          document.documentElement.setAttribute('data-theme', systemTheme);
        }
      } catch (e) {
        console.error('[Theme] Early init failed:', e);
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/popup/main.ts"></script>
</body>
</html>
